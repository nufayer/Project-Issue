<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Issue Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <section class="flex mx-auto justify-center items-center py-60">
        
     <div class="card w-96 bg-base-100 shadow-sm">
        <div class="card-body">
            <div class="mx-auto"> 
                <img src="./assets/github-logo.png">
            </div>
    
    <div class="mx-auto justify-center items-center">
      <h2 class="text-3xl font-bold">GitHub Issue Tracker</h2>
    </div>
    <p class="flex flex mx-auto">Sign in to manage your issues</p>
    <ul class="mt-6 flex flex-col gap-2 text-xs py-2">
      <li>

  <label class="label py-4">Username</label>
<input id="username" type="text" class="input" placeholder="Username" required>

<label class="label py-4">Password</label>
<input id="password" type="password" class="input" placeholder="Password" required>
      </li>
    </ul>
    <div class="mt-6">
      <button onclick="login()" class="btn btn-primary btn-block">Sign In</button>
    </div>
  </div>
</div>
    </section>
    <script src="./script/index.js"></script>
</body>

</html>
