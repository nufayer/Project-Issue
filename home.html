<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Document</title>
</head>
<body>
    
    <header>
        <div class="navbar bg-base-100 shadow-sm px-10">
            <div style="width: 30px;">
                <img src="./assets/github-logo.png">
            </div>
  <div class="flex-1">
    <a class="ghost text-xl font-bold px-4">GitHub Issues Tracker</a>
  </div>
  <div class="flex gap-2">
    <input id="search-input" type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto" />
    <div class="dropdown dropdown-end">
      <button class="btn btn-active btn-primary">+ Add New Issue</button>
    </div>
  </div></div>
</header>

<hr class="my-5">

<section class="w-[80%] mx-auto">
    <div>
        <button onclick="filterIssues('all', this)" class="btn btn-primary filter-btn">All</button>
        <button onclick="filterIssues('open', this)" class="btn filter-btn">Open</button>
        <button onclick="filterIssues('closed', this)" class="btn filter-btn">Closed</button>
    </div>
</section>

<section id="issue-count" class="navbar bg-base-100 shadow-sm w-[80%] mx-auto my-2">
    <div>
        <div>
            <img src="./assets/Aperture.png">
        </div>
    </div>
    <div class="px-4">
        <h2 class="font-bold">50 Issues</h2>
        <p>Track and manage project issues</p>
    </div>
</section>

    
<section id="issue-container" class="bg-base-100 shadow-sm w-[80%] mx-auto my-2 md:grid grid-cols-4 gap-4">

</section>

<script src="./script/index.js"></script>

<dialog id="issue_modal" class="modal">
  <div class="modal-box max-w-l shadow-xl">

    <h2 id="modal-title" class="text-2xl font-bold mb-2"></h2>

    <div class="flex items-center gap-3 text-sm text-gray-500 mb-4">
      <span id="modal-status" class="px-3 py-1 rounded-full text-white text-xs"></span>
      <span>• Opened by <span id="modal-author" class="font-medium"></span></span>
      <span>• <span id="modal-date"></span></span>
    </div>

    <div id="modal-labels" class="flex gap-2 mb-4 flex-wrap"></div>

    <p id="modal-description" class="text-gray-600 mb-6"></p>

    <div class="bg-gray-100 rounded-xl p-4 flex justify-between">
      <div>
        <p class="text-gray-500 text-sm">Assignee:</p>
        <p id="modal-assignee" class="font-semibold"></p>
      </div>

      <div>
        <p class="text-gray-500 text-sm">Priority:</p>
        <span id="modal-priority" class="px-3 py-1 rounded-full text-xs font-semibold"></span>
      </div>
    </div>

    <div class="modal-action">
      <form method="dialog">
        <button class="btn btn-primary">Close</button>
      </form>
    </div>

  </div>
</dialog>

</body>
</html>
